# Forge-Change-start

# Косметика UI планшета SecApartment. Одна тема = одна фракция.

# Принцип: насыщенный фракционный цвет + тёмные фоны, без кислотных #ff**** на всём UI.



# Служба безопасности / отладочный планшет (тёмно-красный, без розового и неона)

- type: secApUiTheme

  id: SecApUiThemeSecurity

  showLogo: true

  showFooter: true

  showOsStripe: true

  logoTexture: /Textures/Interface/Nano/ntlogo.svg.png

  windowBackground: "#0a0606"

  windowBorder: "#381010"

  contentBackground: "#401010"

  contentBorder: "#2c0a0a"

  closeButton: "#b03030"

  divider: "#681818"

  listPanelBackground: "#120505"

  listPanelBorder: "#581414"

  createSquadPanelBackground: "#1a0606"

  createSquadPanelBorder: "#581414"

  cardBackground: "#220808"

  cardBorder: "#701818"

  entryBackground: "#0c0303"

  entryBorder: "#581414"

  memberAliveBackground: "#260808"

  memberAliveBorder: "#983030"

  memberDeadBackground: "#080303"

  memberDeadBorder: "#341010"

  memberDeadText: "#583838"

  tabActive: "#b83838"

  tabInactive: "#684040"

  heading: "#c04040"

  text: "#a05858"

  subText: "#884040"

  placeholder: "#582020"

  buttonBackground: "#341010"

  buttonBorder: "#701818"

  lineEditBackground: "#0c0303"

  optionBackground: "#1a0606"

  tabActiveBackground: "#341010"

  tabInactiveBackground: "#120505"

  panelBackground: "#080303"

  timerOverdue: "#a02828"

  timerCritical: "#a83030"

  timerWarning: "#a83838"

  timerNormal: "#a05858"



