- type: entity
  name: ADS tender spawner
  id: SpawnRedactedBorg
  parent: MarkerBase
  categories: [ HideSpawnMenu ] # Forge-Change
  components:
  - type: ConditionalSpawner
    prototypes:
    - PlayerBorgForerunnerAiRemote # Forge-Change: PlayerBorgRedactedGhostRole > PlayerBorgForerunnerAiRemote; better use Forge ghost role
  - type: Sprite
    sprite: Markers/jobs.rsi
    layers:
    - state: green
    - sprite: Mobs/Silicon/chassis.rsi
      state: derelict_icon

- type: entity
  name: ADS playtime-locked tender spawner
  id: SpawnRedactedBorgPlaytime
  parent: MarkerBase
  categories: [ HideSpawnMenu ] # Forge-Change
  components:
  - type: ConditionalSpawner
    prototypes:
    - PlayerBorgForerunnerGhostRolePlaytime # Forge-Change: PlayerBorgRedactedGhostRolePlaytime > PlayerBorgForerunnerGhostRolePlaytime; better use Forge ghost role
  - type: Sprite
    sprite: Markers/jobs.rsi
    layers:
    - state: green
    - sprite: Mobs/Silicon/chassis.rsi
      state: derelict_icon

- type: entity
  name: chimera ghostrole spawner
  id: SpawnChimeraGhostrole
  parent: MarkerBase
  components:
  - type: ConditionalSpawner
    prototypes:
    - MobLetoferolHorrorGhostrole
  - type: Sprite
    sprite: Markers/jobs.rsi
    layers:
    - state: green

- type: entity
  name: asakim warrior spawner
  id: SpawnAsakimWarrior
  parent: MarkerBase
  categories: [ HideSpawnMenu ] # Forge-Change
  components:
  - type: ConditionalSpawner
    prototypes:
    - MobAsakimWarrior # MobAsakimGhostrole is ignored (see IgnoredPrototypes); use Forge warrior ghost role
  - type: Sprite
    sprite: Markers/jobs.rsi
    layers:
    - state: green
    - sprite: _Mono/Mobs/Species/Asakim/parts.rsi
      state: full
