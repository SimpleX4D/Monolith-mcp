- type: entity
  parent: ClothingOuterHardsuitBase
  id: ClothingOuterHardsuitMercenaryWarlord
  name: PMC WL-01
  description: Nicknamed "Warlord",a former state-of-the-art technology in military equipment, now widespread among the mercenaries and black markets due to its schematics being revealed to the public, the warlord combat suit has been modified to withstand space depressurized atmosphere, rating it space capable.
  components:
  - type: Sprite
    sprite: _Mono/Clothing/OuterClothing/Hardsuits/merc_warlordsuit.rsi
  - type: Clothing
    sprite: _Mono/Clothing/OuterClothing/Hardsuits/merc_warlordsuit.rsi
  - type: PressureProtection
    highPressureMultiplier: 0.5
    lowPressureMultiplier: 1000
  - type: ExplosionResistance
    damageCoefficient: 0.5
  - type: Armor
    modifiers:
      coefficients:
        Blunt: 0.65
        Slash: 0.6
        Piercing: 0.6
        Heat: 0.65
        Radiation: 0.6
        Caustic: 0.8
  - type: ClothingSpeedModifier
    walkModifier: 0.9 # 0.95-> 0.9 Forge-change 
    sprintModifier: 0.9 # 0.95-> 0.9 Forge-change 
  - type: HeldSpeedModifier
  - type: ToggleableClothing # Goobstation - Modsuits change - Mono - this is a solution for helmet attachment/cover to not fit on hardsuits
    requiredSlot: outerclothing
    blockUnequipWhenAttached: false
    replaceCurrentClothing: true
    clothingPrototypes:
      head: ClothingHelmetHardsuitMercenaryWarlord
      helmetcover: ClothingHeadHelmetCoverBlock
      helmetattachment: ClothingHeadHelmetAttachmentBlock
  - type: PirateBountyItem
    id: ClothingOuterHardsuitTacsuit
  - type: StaminaDamageResistance
    coefficient: 0.6

# SCAF hardsuit
- type: entity
  parent: ClothingOuterHardsuitBase
  id: ClothingOuterHardsuitScaf
  name: SCAF hardsuit
  description: A kevlar reinforced combat hardsuit. Old yet sturdy nonetheless. # mono - not green anymore cuh
  components:
  - type: Sprite
    sprite: _NF/Clothing/OuterClothing/Hardsuits/scaf.rsi
  - type: Clothing
    sprite: _NF/Clothing/OuterClothing/Hardsuits/scaf.rsi
  - type: Armor
    modifiers:
      coefficients: # Mono - all of these values are changed
        Blunt: 0.6 # 0.5-> 0.6 Forge-change 
        Slash: 0.6 # 0.5-> 0.6 Forge-change 
        Piercing: 0.5 # Mono, 0.45-> 0.5 Forge-change 
        Heat: 0.6 # 0.45-> 0.6 Forge-change 
        Radiation: 0.5 # Added Radiation Resist
        Caustic: 0.65
  - type: ExplosionResistance
    damageCoefficient: 0.5 # 0.35-> 0.5 Forge-change 
  - type: PressureProtection
    highPressureMultiplier: 0.5
    lowPressureMultiplier: 1000
  - type: ClothingSpeedModifier # Mono - Armor Value Changes
    walkModifier: 0.85 # 0.825-> 0.85 Forge-change
    sprintModifier: 0.85 # 0.825-> 0.85 Forge-change
  - type: HeldSpeedModifier
  - type: ToggleableClothing # Goobstation - Modsuits change - Mono - this is a solution for helmet attachment/cover to not fit on hardsuits
    requiredSlot: outerclothing
    blockUnequipWhenAttached: false
    replaceCurrentClothing: true
    clothingPrototypes:
      head:  ClothingHeadHelmetHardsuitScaf
      helmetcover: ClothingHeadHelmetCoverBlock
      helmetattachment: ClothingHeadHelmetAttachmentBlock
  - type: PirateBountyItem # Mono
    id: ClothingOuterHardsuitTacsuitHighValue
  - type: StaminaDamageResistance # Mono - Stamres
    coefficient: 0.45
