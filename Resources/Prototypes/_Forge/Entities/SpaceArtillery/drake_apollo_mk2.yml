- type: entity
  parent: ShuttleGunKineticFlatpack
  id: WeaponTurretDrakeApolloMk2Flatpack
  name: Apollo MK2 mining laser flatpack
  suffix: Drake, НЕ МАППИТЬ
  description: A flatpack used for constructing a Drake Industries Apollo MK2 mining laser cannon.
  components:
  - type: Flatpack
    entity: WeaponTurretDrakeApolloMk2
  - type: StaticPrice
    price: 250
  - type: Sprite
    layers:
