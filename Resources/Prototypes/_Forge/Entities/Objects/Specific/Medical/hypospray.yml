- type: entity
  name: боевой стимулятор
  parent: [ BaseCentcommContraband, ChemicalMedipen ]
  id: CombatNaniteMedipen
  description: "Экспериментальный автоинъектор созданный для быстрого возращения в бой бойца, после использования рекомендуется обратиться к настоящему врачу.\nВнимание! Не рекомендуется использовать более двух инъекторов за раз."
  components:
  - type: Item
  - type: Sprite
    sprite: Objects/Specific/Medical/medipen.rsi
    layers:
    - state: atropen
      map: ["enum.SolutionContainerLayers.Fill"]
  - type: SolutionContainerVisuals
    maxFillLevels: 1
    changeColor: false
    emptySpriteName: atropen_empty
  - type: SolutionContainerManager
    solutions:
      pen:
        maxVol: 5
        reagents:
        - ReagentId: CombatNanites
          Quantity: 5

- type: entity
  name: naloxone medipen
  parent: [ChemicalMedipen]
  id: NaloxoneMedipen
  description: A single-use medipen containing chemicals that regenerate morphine addictive.
  components:
  - type: Sprite
    sprite: Forge/Objects/Specific/Medical/medipen.rsi
    layers:
    - state: naloxone
      map: ["enum.SolutionContainerLayers.Fill"]
  - type: SolutionContainerVisuals
    maxFillLevels: 1
    changeColor: false
    emptySpriteName: naloxone_empty
  - type: SolutionContainerManager
    solutions:
      pen:
        maxVol: 9
        reagents:
        - ReagentId: Naloxone
          Quantity: 9
  - type: Hypospray
    solutionName: pen
    transferAmount: 30
    onlyAffectsMobs: false
    injectOnly: true
  - type: StaticPrice
    price: 2500
  - type: Tag
    tags: []

