# for ullman sniper rifle
- type: entity
  id: ForgeBulletUllman127x85mm
  name: bullet (127x85mm)
  parent: ForgeBaseBulletAntiMateriel
  categories: [ HideSpawnMenu ]
  components:
  - type: Projectile
    damage:
      types:
        Piercing: 50
        Structural: 300
    armorPenetration: 1
    penetrationThreshold: 250
    penetrationDamageTypeRequirement:
    - Structural
# end

- type: entity
  id: ForgeBulletRifle60
  name: bullet (.60 rifle)
  parent: ForgeBaseBulletAntiMateriel
  categories: [ HideSpawnMenu ]
  components:
  - type: Projectile
    damage: # Corvax-Forge-change
      types:
        Piercing: 70
        Structural: 100
    armorPenetration: 0.5 # Forge-Change
    penetrationThreshold: 360
    penetrationDamageTypeRequirement:
    - Structural

- type: entity
  id: ForgeBulletRifle60Rubber
  name: bullet (.60 rifle, rubber)
  parent: ForgeBaseBulletAntiMaterielRubber
  categories: [ HideSpawnMenu ]
  components:
  - type: Projectile
    damage:
      types:
        Blunt: 15  # Corvax-Forge-change
  - type: StaminaDamageOnCollide
    damage: 80  # Corvax-Forge-change

- type: entity
  id: ForgeBulletRifle60AP
  name: bullet (.60 rifle)
  parent: ForgeBaseBulletAntiMateriel
  categories: [ HideSpawnMenu ]
  components:
  - type: Projectile
    damage:
      types:
        Piercing: 70
        Structural: 300
    armorPenetration: 0.85 # Forge-Change: moved out of DamageSpecifier
    penetrationThreshold: 700
    penetrationDamageTypeRequirement:
    - Structural

- type: entity
  id: ForgeBulletRifle60Incendiary
  name: bullet (.60 Incendiary)
  parent: ForgeBaseBulletAntiMateriel
  categories: [ HideSpawnMenu ]
  components:
  - type: Projectile
    damage:
      types:
        Piercing: 25
        Heat: 20
        Structural: 100
    armorPenetration: 0.6 # Forge-Change: moved out of DamageSpecifier
    penetrationThreshold: 360
    penetrationDamageTypeRequirement:
    - Structural
  - type: PointLight
    enabled: true
    color: "#ff4300"
    radius: 1.1
    energy: 3.0
  - type: IgniteOnCollide
    fireStacks: 1
  - type: IgnitionSource
    ignited: true

