    - ForgeMagazineUllman127x85mm
  - type: Item
    size: Small
  - type: BallisticAmmoProvider
    mayTransfer: true
    whitelist:
      tags:
      - ForgeCartridgeUllman127x85mm
    proto: ForgeCartridgeUllman127x85mm
    capacity: 5
  - type: ContainerContainer
    containers:
      ballistic-ammo: !type:Container
