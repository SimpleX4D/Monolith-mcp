- type: entity
  parent: [ BaseItem, PowerCellSlotHighItem ]
  id: TSFSecApartmentTablet
  name: portable personnel monitor
  description: "A portable device for monitoring personnel, organizing squads, and coordinating actions."
  suffix: Powered
  components:
  - type: Sprite
    sprite: Forge/Objects/Devices/secapartments/TSF.rsi
    layers:
    - state: base
    - state: powered
      shader: unshaded
      visible: true
      map: [ "enum.PowerDeviceVisualLayers.Powered" ]
  - type: ActivatableUI
    key: enum.SecApartmentUiKey.Key
    inHandsOnly: true
    requireActiveHand: true
  - type: UserInterface
    interfaces:
      enum.SecApartmentUiKey.Key:
        type: SecApartmentBoundUserInterface
  - type: ItemToggle
    onUse: false
  - type: PowerCellDraw
    drawRate: 1.2
  - type: ToggleCellDraw
  - type: ActivatableUIRequiresPowerCell
  - type: SecApartment
    department: TSF
    requireUserDepartment: true
    squadIconPrefix: TSFSquadIcon
    uiTheme: SecApUiThemeTSF
  - type: AccessReader
    requiredCompany: TSF
    access: [["TsfSecApartment"]]
  - type: ActivatableUIRequiresAccess
  - type: CrewMonitoringConsole
  - type: DeviceNetwork
    deviceNetId: Wireless
    receiveFrequencyId: CrewMonitor
  - type: WirelessNetworkConnection
    range: 500
  - type: StationLimitedNetwork
  - type: Appearance
  - type: GenericVisualizer
    visuals:
      enum.PowerCellSlotVisuals.Enabled:
        enum.PowerDeviceVisualLayers.Powered:
          True: { visible: true }
          False: { visible: false }

- type: entity
  id: TSFSecApartmentTabletEmpty
  parent: TSFSecApartmentTablet
  suffix: Empty
  components:
  - type: Sprite
    layers:
    - state: base
    - state: powered
      shader: unshaded
      visible: false
      map: [ "enum.PowerDeviceVisualLayers.Powered" ]
  - type: ItemSlots
    slots:
      cell_slot:
        name: power-cell-slot-component-slot-name-default

